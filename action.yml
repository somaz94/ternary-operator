name: 'Ternary Operator Action'
description: 'Generates outputs based on dynamic conditions, directly sets environment variables'
author: 'somaz94'
inputs:
  conditions:
    description: 'Comma-separated conditions to evaluate (max 10 conditions)'
    required: true
  true_values:
    description: 'Comma-separated values if conditions are true (must match number of conditions)'
    required: true
  false_values:
    description: 'Comma-separated values if conditions are false (must match number of conditions)'
    required: true
  default_values:
    description: 'Comma-separated fallback values when condition evaluation fails (must match number of conditions)'
    required: false
    default: ''
  case_sensitive:
    description: 'Enable case-sensitive comparison (true/false, default: true)'
    required: false
    default: 'true'
  debug_mode:
    description: 'Enable detailed debug logging (true/false)'
    required: false
    default: 'false'
outputs:
  result:
    description: 'JSON object containing all outputs (e.g. {"output_1": "value1", "output_2": "value2"})'
  output_1:
    description: 'Output for the first condition'
  output_2:
    description: 'Output for the second condition'
  output_3:
    description: 'Output for the third condition'
  output_4:
    description: 'Output for the fourth condition'
  output_5:
    description: 'Output for the fifth condition'
  output_6:
    description: 'Output for the sixth condition'
  output_7:
    description: 'Output for the seventh condition'
  output_8:
    description: 'Output for the eighth condition'
  output_9:
    description: 'Output for the ninth condition'
  output_10:
    description: 'Output for the tenth condition'
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.conditions }}
    - ${{ inputs.true_values }}
    - ${{ inputs.false_values }}
    - ${{ inputs.default_values }}
    - ${{ inputs.case_sensitive }}
    - ${{ inputs.debug_mode }}
branding:
  icon: 'award'
  color: 'blue'
